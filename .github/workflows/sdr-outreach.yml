name: AI SDR Outreach

on:
  schedule:
    - cron: "0 12 * * *"  # 08:00 EDT (UTC-4, Apr-Oct)
  workflow_dispatch:

jobs:
  sdr-outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: sdr-outreach/requirements.txt

      - name: Install dependencies
        run: pip install -r sdr-outreach/requirements.txt

      - name: Run AI SDR outreach
        env:
          HUBSPOT_API_KEY:    ${{ secrets.HUBSPOT_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID:     ${{ secrets.NOTION_PAGE_ID }}
        run: python sdr-outreach/generate.py
