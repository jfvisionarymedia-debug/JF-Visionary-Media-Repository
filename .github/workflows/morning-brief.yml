name: Morning Brief

on:
  schedule:
    - cron: "0 10 * * *"  # 06:00 EDT (UTC-4, Apr-Oct)
  workflow_dispatch:       # allow manual trigger from the Actions tab

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: morning-brief/requirements.txt

      - name: Install dependencies
        run: pip install -r morning-brief/requirements.txt

      - name: Run morning brief
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python morning-brief/generate.py
